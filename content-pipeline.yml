name: Univursyl Content Pipeline

on:
  schedule:
    # 4x daily: 6am, 12pm, 6pm, 11pm ET
    - cron: '0 11,17,23,4 * * *'
  workflow_dispatch:

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch space news
        env:
          NEWS_API_KEY:   ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_KEY:  ${{ secrets.ANTHROPIC_KEY }}
          NASA_API_KEY:   ${{ secrets.NASA_API_KEY }}
        run: node scripts/fetch-news.js

      - name: Fetch NASA APOD
        env:
          NASA_API_KEY:  ${{ secrets.NASA_API_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: node scripts/fetch-apod.js

      - name: Fetch launch data
        run: node scripts/fetch-launches.js

      - name: Generate HTML
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: node scripts/build-pages.js

      - name: Commit & push
        run: |
          git config --global user.name  "univursyl-bot"
          git config --global user.email "bot@univursyl.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: content update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
